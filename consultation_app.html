<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find Your Specialist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar hiding for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Carousel Snapping */
        .snap-x-mandatory {
            scroll-snap-type: x mandatory;
        }
        .snap-center {
            scroll-snap-align: center;
        }
        .snap-always {
            scroll-snap-stop: always;
        }
        .touch-pan-x {
            touch-action: pan-x;
        }

        /* Chat Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-animate {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Typing Dots Animation */
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out;
            fill: currentColor;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen overflow-hidden text-slate-800 antialiased selection:bg-indigo-200">

    <!-- Mobile App Container -->
    <div id="app-container" class="w-full max-w-md h-full bg-white relative overflow-hidden shadow-2xl sm:rounded-3xl sm:h-[90vh] sm:my-auto sm:border sm:border-gray-200 flex flex-col">
        
        <!-- ============================== -->
        <!-- SCREEN 1: SPECIALIST SELECTION -->
        <!-- ============================== -->
        <div id="screen-selection" class="absolute inset-0 flex flex-col transition-transform duration-500 ease-in-out z-10 bg-slate-50">
            <!-- Header -->
            <div class="px-6 pt-12 pb-6 bg-white shadow-sm z-10 rounded-b-3xl">
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Expert Match</h1>
                <p class="text-slate-500 mt-2">Swipe to choose your specialist</p>
            </div>

            <!-- Carousel -->
            <div class="flex-1 flex flex-col justify-center pb-8 overflow-hidden relative">
                
                <!-- Carousel Arrows -->
                <button onclick="scrollCarousel(-1)" class="absolute left-3 top-1/2 transform -translate-y-1/2 z-20 bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-lg hover:bg-white transition-all focus:outline-none active:scale-95">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button onclick="scrollCarousel(1)" class="absolute right-3 top-1/2 transform -translate-y-1/2 z-20 bg-white/80 backdrop-blur-sm p-3 rounded-full shadow-lg hover:bg-white transition-all focus:outline-none active:scale-95">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <div id="carousel" class="flex overflow-x-auto overflow-y-hidden snap-x-mandatory touch-pan-x overscroll-x-contain no-scrollbar w-full px-6 py-8 space-x-6 items-center z-10">
                    <!-- Specialist Cards injected via JS -->
                </div>
                
                <!-- Pagination Dots -->
                <div id="carousel-dots" class="flex justify-center space-x-2 mt-4 relative z-10">
                    <!-- Dots injected via JS -->
                </div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- SCREEN 1.5: CONNECTING OVERLAY -->
        <!-- ============================== -->
        <div id="screen-connecting" class="absolute inset-0 flex flex-col items-center justify-center z-40 bg-slate-900/85 backdrop-blur-lg transition-opacity duration-500 opacity-0 pointer-events-none">
            <div class="relative flex items-center justify-center mb-8">
                <!-- Radar ping effect -->
                <div class="absolute w-24 h-24 bg-indigo-500 rounded-full animate-ping opacity-75"></div>
                <!-- Outer pulse rings -->
                <div class="absolute w-36 h-36 border-2 border-indigo-400 rounded-full animate-pulse opacity-50"></div>
                <div class="absolute w-48 h-48 border border-indigo-300 rounded-full animate-pulse opacity-20" style="animation-delay: 200ms;"></div>
                
                <!-- Avatar -->
                <img id="connecting-avatar" src="" class="w-24 h-24 rounded-full object-cover border-4 border-indigo-500 relative z-10 shadow-[0_0_30px_rgba(99,102,241,0.6)]">
                
                <!-- Small lock icon (secure) -->
                <div class="absolute bottom-0 right-0 z-20 bg-slate-800 p-1.5 rounded-full border border-slate-700">
                    <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
            </div>
            
            <h3 class="text-2xl font-bold text-white mb-2 tracking-wide">Connecting</h3>
            <div class="flex items-center space-x-2">
                <svg id="connecting-spinner" class="w-4 h-4 animate-spin text-indigo-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p id="connecting-status" class="text-indigo-300 text-sm font-medium transition-colors duration-300">Initializing secure channel...</p>
            </div>
        </div>

        <!-- ============================== -->
        <!-- SCREEN 2: CHAT INTERFACE       -->
        <!-- ============================== -->
        <div id="screen-chat" class="absolute inset-0 translate-x-full flex flex-col transition-transform duration-500 ease-in-out z-20 bg-gray-50">
            <!-- Chat Header -->
            <div class="px-4 pt-12 pb-4 bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100 flex items-center z-10">
                <button onclick="goBack()" class="p-2 -ml-2 text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="flex items-center ml-2">
                    <div class="relative">
                        <img id="chat-avatar" src="" alt="Specialist" class="w-10 h-10 rounded-full object-cover border-2 border-indigo-100">
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="ml-3">
                        <h2 id="chat-name" class="font-bold text-slate-800 leading-tight">Name</h2>
                        <p id="chat-online-status" class="text-xs text-green-600 font-medium transition-colors duration-300">Online now</p>
                    </div>
                </div>
            </div>

            <!-- Chat Messages Area -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <!-- Messages injected via JS -->
            </div>

            <!-- Chat Options (Replaces Input Field) -->
            <div class="absolute bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)] p-4 pt-3 pb-8 sm:pb-4 rounded-t-3xl transition-transform duration-300 transform translate-y-full opacity-0" id="chat-options-container">
                <p class="text-xs text-center text-slate-400 mb-3 font-medium uppercase tracking-wider">Choose your response</p>
                <div id="chat-options" class="flex flex-wrap gap-2 justify-center">
                    <!-- Choice buttons injected via JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- DATA ---

        const specialists = [
            {
                id: 1,
                name: "Dr. Elena Vasquez",
                role: "Clinical Psychology & Anxiety Disorders",
                rating: 4.9,
                reviews: 215,
                image: "https://i.ibb.co/bgrPmFT9/716150166-17876319642669439-7747968184451200212-n.jpg",
                description: "Experienced clinician specializing in evidence-based treatment of anxiety, panic attacks, and generalized worry. Over 18 years helping clients regain calm and control."
            },
            {
                id: 2,
                name: "Dr. Sophia Laurent",
                role: "Trauma & PTSD Recovery",
                rating: 5.0,
                reviews: 142,
                image: "https://i.ibb.co/NggRbfhn/683533118-18099214249855949-7629124632139636811-n.jpg",
                description: "Internationally trained trauma specialist using EMDR and somatic therapy. Dedicated to supporting survivors of abuse, accidents, and complex trauma."
            },
            {
                id: 3,
                name: "Dr. Maya Kensington",
                role: "Depression & Mood Disorders",
                rating: 4.8,
                reviews: 189,
                image: "https://i.ibb.co/DPwp2kVn/722313960-17928204345338387-1780687740667333386-n.jpg",
                description: "Expert in cognitive behavioral therapy for depression and bipolar disorder. Focuses on rebuilding motivation, self-worth, and emotional balance."
            },
            {
                id: 4,
                name: "Dr. Aisha Rahman",
                role: "Neuropsychology & Cognitive Health",
                rating: 4.9,
                reviews: 310,
                image: "https://i.ibb.co/0jm7qW9p/589293424-17866331829523998-4688332206835270977-n.jpg",
                description: "Leading specialist in cognitive assessments, early dementia detection, and brain health. Combines neuropsychological testing with personalized interventions."
            },
            {
                id: 5,
                name: "Dr. Olivia Moreau",
                role: "Relationship & Family Therapy",
                rating: 4.7,
                reviews: 95,
                image: "https://i.ibb.co/xts2WX5m/125281249-443695769955306-7388038805590309579-n.jpg",
                description: "Certified marriage and family therapist helping couples and families heal conflicts, improve communication, and strengthen emotional bonds."
            },
            {
                id: 6,
                name: "Dr. Natalia Petrova",
                role: "Autism Spectrum & Neurodiversity",
                rating: 5.0,
                reviews: 128,
                image: "https://i.ibb.co/6c20tZvf/468309076-2001858930253450-77665364032881964-n.jpg",
                description: "Specialist in adult autism assessment and support. Passionate about helping neurodivergent individuals understand their strengths and navigate challenges."
            },
            {
                id: 7,
                name: "Dr. Isabella Hart",
                role: "Mindfulness & Positive Psychology",
                rating: 4.9,
                reviews: 204,
                image: "https://i.ibb.co/0L0GrXc/728035567-18113459728778967-6550860361973291001-n.jpg",
                description: "Combines mindfulness-based stress reduction with positive psychology to treat burnout, build resilience, and help clients create meaningful, fulfilling lives."
            }
        ];

        let chatState = {
            tagQ3: '',
            tagQ4: '',
            hasKids: false,
            mainTrack: ''
        };

        const chatScript = {
            "start": {
                text: "Hi, I'm really glad you're here. 😊 I'll start with a few quick questions about you — this helps me ask the right things later instead of generic ones. Ready?",
                options: [{ label: "Ready", next: "q1" }]
            },
            "q1": {
                text: "How do you identify?",
                options: [
                    { label: "Male", next: "q2" },
                    { label: "Female", next: "q2" },
                    { label: "Non-binary", next: "q2" },
                    { label: "Prefer not to say", next: "q2" }
                ]
            },
            "q2": {
                text: "What's your age range?",
                options: [
                    { label: "Under 18", next: "q3" },
                    { label: "18–25", next: "q3" },
                    { label: "26–40", next: "q3" },
                    { label: "41+", next: "q3" }
                ]
            },
            "q3": {
                text: "Which best describes your current situation?",
                options: [
                    { label: "Student", action: () => chatState.tagQ3 = 'A', next: "q4" },
                    { label: "Employed", action: () => chatState.tagQ3 = 'B', next: "q4" },
                    { label: "Unemployed", action: () => chatState.tagQ3 = 'C', next: "q4" },
                    { label: "Retired", action: () => chatState.tagQ3 = 'D', next: "q4" }
                ]
            },
            "q4": {
                text: "What's your relationship status right now?",
                options: [
                    { label: "Single", action: () => chatState.tagQ4 = 'X', next: "q5" },
                    { label: "In a relationship / married", action: () => chatState.tagQ4 = 'Y', next: "q5" },
                    { label: "Divorced, separated, or widowed", action: () => chatState.tagQ4 = 'Z', next: "q5" }
                ]
            },
            "q5": {
                text: "Who do you currently live with?",
                options: [
                    { label: "Alone", next: "q6" },
                    { label: "With family or a partner", next: "q6" },
                    { label: "With roommates or friends", next: "q6" }
                ]
            },
            "q6": {
                text: "Do you have any children?",
                options: [
                    { label: "Yes", action: () => chatState.hasKids = true, next: "q7" },
                    { label: "No", action: () => chatState.hasKids = false, next: "q7" }
                ]
            },
            "q7": {
                text: "What's the main reason you decided to talk to someone today?",
                options: [
                    { label: "Feeling stressed or anxious", action: () => chatState.mainTrack = 'A', next: "q8" },
                    { label: "Low mood or sadness", action: () => chatState.mainTrack = 'B', next: "q8" },
                    { label: "Relationship or family issues", action: () => chatState.mainTrack = 'C', next: "q8" },
                    { label: "Just want to talk things through", action: () => chatState.mainTrack = 'D', next: "q8" }
                ]
            },
            "q8": {
                text: "Thanks for sharing that. In your own words — what's been going on lately that brought you here?",
                type: "text",
                next: "sec2_intro"
            },
            "sec2_intro": {
                text: "Got it. Now let's check in on the basics.",
                autoNext: "q9"
            },
            "q9": {
                text: "Over the past two weeks, how would you say your mood has been?",
                options: [
                    { label: "Pretty good 🙂", next: "q10" },
                    { label: "Okay, up and down 😐", next: "q10" },
                    { label: "Not great 😕", next: "q9a" },
                    { label: "Really struggling 😔", next: "q9a" }
                ]
            },
            "q9a": {
                text: "How long have you been feeling this way?",
                options: [
                    { label: "A few days", next: "q10" },
                    { label: "A couple of weeks", next: "q10" },
                    { label: "Over a month", next: "q10" },
                    { label: "Months, on and off", next: "q10" }
                ]
            },
            "q10": {
                text: "How many hours do you usually sleep a night?",
                options: [
                    { label: "Less than 5", next: "q10a" },
                    { label: "5–6", next: "q10a" },
                    { label: "7–8", next: "q11" },
                    { label: "More than 8", next: "q11" }
                ]
            },
            "q10a": {
                text: "What's usually keeping you from sleeping well?",
                options: [
                    { label: "Racing thoughts/worry", next: "q11" },
                    { label: "Physical discomfort", next: "q11" },
                    { label: "Screens / habits before bed", next: "q11" },
                    { label: "Honestly, no idea", next: "q11" }
                ]
            },
            "q11": {
                text: "How would you describe your energy during the day?",
                options: [
                    { label: "High", next: "interactive_1" },
                    { label: "Moderate", next: "interactive_1" },
                    { label: "Low, I feel drained a lot", next: "interactive_1" }
                ]
            },
            "interactive_1": {
                text: "Let's pause for a moment and do a quick visual perception exercise. This helps me assess how your brain is processing information right now. I'll share a static image — many people with early signs of dementia report seeing movements in it due to neural connection changes.",
                autoNext: "interactive_1_img"
            },
            "interactive_1_img": {
                image: "https://seewellcincinnati.com/wp-content/uploads/2026/01/optical-illusions-2026_620.jpg",
                autoNext: "interactive_1_q"
            },
            "interactive_1_q": {
                text: "Do you notice any movements or changes in this image?",
                options: [
                    { label: "Yes, I see movement", next: "q12" },
                    { label: "No, it's completely still", next: "q12" },
                    { label: "I'm not sure / subtle changes", next: "q12" }
                ]
            },
            "q12": {
                text: "Do you find yourself feeling anxious or on edge?",
                options: [
                    { label: "Almost all the time", next: "q12a" },
                    { label: "Often", next: "q12a" },
                    { label: "Sometimes", next: "q13" },
                    { label: "Rarely", next: "q13" }
                ]
            },
            "q12a": {
                text: "When that hits, do you ever notice physical stuff too — racing heart, tight chest, trouble breathing?",
                options: [
                    { label: "Yes, fairly often", next: "q13" },
                    { label: "No, mostly just mentally", next: "q13" }
                ]
            },
            "q13": {
                text: "Have you noticed any change in your appetite recently?",
                options: [
                    { label: "Eating more than usual", next: "interactive_2" },
                    { label: "Eating less than usual", next: "interactive_2" },
                    { label: "No real change", next: "interactive_2" }
                ]
            },
            "interactive_2": {
                text: "Thank you. Let's take a short breath together. Now we'll do a color perception test. This particular image is used in assessments for early signs of autism spectrum traits if the individual sees nothing.",
                autoNext: "interactive_2_img"
            },
            "interactive_2_img": {
                image: "https://preview.redd.it/reverse-colorblind-test-red-green-deuteranomaly-v0-trfrhdyn1lbg1.png?width=800&format=png&auto=webp&s=7a05e5ba0c5eed270a6406869f9d6d832cae3afd",
                autoNext: "interactive_2_q"
            },
            "interactive_2_q": {
                text: "What number do you see in the image?",
                options: [
                    { label: "72", next: "q14" },
                    { label: "67", next: "q14" },
                    { label: "I do not see any number", next: "q14" }
                ]
            },
            "q14": {
                text: "How connected do you feel to the people around you right now?",
                options: [
                    { label: "Very connected", next: "sec3_intro" },
                    { label: "Somewhat connected", next: "sec3_intro" },
                    { label: "Not very connected", next: "q14a" },
                    { label: "Pretty isolated", next: "q14a" }
                ]
            },
            "q14a": {
                text: "How long have you felt distant from people?",
                options: [
                    { label: "Just recently", next: "sec3_intro" },
                    { label: "A few months", next: "sec3_intro" },
                    { label: "A long time, honestly", next: "sec3_intro" }
                ]
            },
            "sec3_intro": {
                text: "Thanks for walking through that with me. Now let's talk about what's really on your mind.",
                autoNextFn: () => {
                    if (chatState.mainTrack === 'A') return "qa1";
                    if (chatState.mainTrack === 'B') return "qb1";
                    if (chatState.mainTrack === 'C') return "qc1";
                    return "qd1";
                }
            },
            
            // --- TRACK A (Stress & Anxiety) ---
            "qa1": {
                textFn: () => {
                    if (chatState.tagQ3 === 'A') return "How manageable is your academic workload right now?";
                    if (chatState.tagQ3 === 'B') return "How manageable is your workload at work right now?";
                    if (chatState.tagQ3 === 'C') return "How stressful has the job search or financial side of things been?";
                    return "How satisfied do you feel with how you're spending your time these days?";
                },
                options: [
                    { label: "Very manageable", next: "qa2" },
                    { label: "Manageable, but tight", next: "qa2" },
                    { label: "Hard to keep up with", next: "qa2" },
                    { label: "Completely overwhelming", next: "qa1a" }
                ]
            },
            "qa1a": {
                text: "Has it gotten to a point where it's affecting your sleep, eating, or relationships?",
                options: [
                    { label: "Yes, noticeably", next: "qa2" },
                    { label: "A little", next: "qa2" },
                    { label: "Not really", next: "qa2" }
                ]
            },
            "qa2": {
                text: "When stress builds up, what do you lean toward most?",
                options: [
                    { label: "Talking to someone about it", next: "qa3" },
                    { label: "Distracting myself", next: "qa3" },
                    { label: "Physical activity or a hobby", next: "qa3" },
                    { label: "I tend to bottle it up", next: "qa2a" }
                ]
            },
            "qa2a": {
                text: "Has bottling it up ever caused tension in a relationship or at work?",
                options: [
                    { label: "Yes, more than once", next: "qa3" },
                    { label: "Once or twice", next: "qa3" },
                    { label: "Not that I've noticed", next: "qa3" }
                ]
            },
            "qa3": {
                text: "Do you use alcohol, smoking, or anything similar to take the edge off?",
                options: [
                    { label: "Never", next: "interactive_3" },
                    { label: "Occasionally", next: "interactive_3" },
                    { label: "Fairly regularly", next: "qa3a" }
                ]
            },
            "qa3a": {
                text: "What do you usually turn to?",
                options: [
                    { label: "Alcohol", next: "interactive_3" },
                    { label: "Smoking / vaping", next: "interactive_3" },
                    { label: "Something else", next: "interactive_3" }
                ]
            },

            // --- TRACK B (Low Mood) ---
            "qb1": {
                text: "Do you still enjoy the things you used to enjoy?",
                options: [
                    { label: "Yes, just as much", next: "qb2" },
                    { label: "Less than before", next: "qb1a" },
                    { label: "Not really anymore", next: "qb1a" }
                ]
            },
            "qb1a": {
                text: "How long has it felt that way?",
                options: [
                    { label: "Recently", next: "qb2" },
                    { label: "A few months", next: "qb2" },
                    { label: "A long time", next: "qb2" }
                ]
            },
            "qb2": {
                text: "How do you feel about yourself these days?",
                options: [
                    { label: "Pretty confident", next: "qb3" },
                    { label: "It varies", next: "qb3" },
                    { label: "Often critical of myself", next: "qb2a" },
                    { label: "Very negative about myself", next: "qb2a" }
                ]
            },
            "qb2a": {
                text: "Do you find yourself comparing yourself to other people a lot?",
                options: [
                    { label: "Constantly", next: "qb3" },
                    { label: "Sometimes", next: "qb3" },
                    { label: "Not really", next: "qb3" }
                ]
            },
            "qb3": {
                text: "How often do you feel sad or down without a clear reason?",
                options: [
                    { label: "Almost every day", next: "qb3a" },
                    { label: "Several times a week", next: "qb3a" },
                    { label: "Occasionally", next: "qb4" },
                    { label: "Rarely", next: "qb4" }
                ]
            },
            "qb3a": {
                text: "Has this been going on for more than two weeks?",
                options: [
                    { label: "Yes", next: "qb4" },
                    { label: "No, it's more recent", next: "qb4" }
                ]
            },
            "qb4": {
                text: "How's your focus and concentration been lately?",
                options: [
                    { label: "Sharp, no issues", next: "interactive_3" },
                    { label: "A bit foggy", next: "interactive_3" },
                    { label: "Hard to concentrate at all", next: "interactive_3" }
                ]
            },

        // --- STATE ---
        let currentSpecialist = null;

        // --- INITIALIZATION ---
        function init() {
            renderSpecialists();

        // --- SPECIALIST SELECTION LOGIC ---

        function scrollCarousel(direction) {
            const cardWidth = carouselEl.firstElementChild ? carouselEl.firstElementChild.offsetWidth : 0;
            const gap = 24; // space-x-6 is 1.5rem = 24px
            const scrollAmount = cardWidth + gap;

            carouselEl.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        function getStars(rating) {
            const fullStar = '<svg class="w-4 h-4 text-amber-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';
            
            // Create a unique ID for the linear gradient to avoid conflicts
            const uniqueId = 'half-' + Math.random().toString(36).substr(2, 9);
            const halfStar = `<svg class="w-4 h-4" viewBox="0 0 20 20"><defs><linearGradient id="${uniqueId}"><stop offset="50%" stop-color="#fbbf24"/><stop offset="50%" stop-color="#d1d5db"/></linearGradient></defs><path fill="url(#${uniqueId})" d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
            
            const emptyStar = '<svg class="w-4 h-4 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>';

            let starsHtml = '';
            const fullStarsCount = Math.floor(rating);
            const hasHalfStar = rating % 1 !== 0;

            for (let i = 1; i <= 5; i++) {
                if (i <= fullStarsCount) {
                    starsHtml += fullStar;
                } else if (i === fullStarsCount + 1 && hasHalfStar) {
                    starsHtml += halfStar;
                } else {
                    starsHtml += emptyStar;
                }
            }
            return starsHtml;
        }

        function renderSpecialists() {
            carouselEl.innerHTML = '';
            dotsEl.innerHTML = '';

            specialists.forEach((spec, index) => {
                const card = document.createElement('div');
                card.className = 'snap-center snap-always w-full min-w-full flex-shrink-0 bg-white rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] p-6 flex flex-col items-center text-center border border-gray-50 transform transition-all duration-300';

                            <svg class="w-5 h-5 text-indigo-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>

                    <button onclick="startChat(${spec.id})" class="mt-8 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95 flex items-center justify-center space-x-2">
                        <span>Chat with ${spec.name.split(' ')[0]}</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                `;
                carouselEl.appendChild(card);

                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${index === 0 ? 'bg-indigo-600 w-6' : 'bg-gray-300'}`;
                dot.id = `dot-${index}`;
                dotsEl.appendChild(dot);
            });
        }

        function setupCarouselObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = Array.from(carouselEl.children).indexOf(entry.target);
                        updateDots(index);
                    }
                });
            }, { root: carouselEl, threshold: 0.5 });

            Array.from(carouselEl.children).forEach(card => observer.observe(card));
        }

        function updateDots(activeIndex) {
            Array.from(dotsEl.children).forEach((dot, index) => {
                if (index === activeIndex) {
                    dot.className = 'w-6 h-2 bg-indigo-600 rounded-full transition-all duration-300';
                } else {
                    dot.className = 'w-2 h-2 bg-gray-300 rounded-full transition-all duration-300';
                }
            });
        }

        // --- CHAT LOGIC ---

        function startChat(specialistId) {
            currentSpecialist = specialists.find(s => s.id === specialistId);
            
            const connectingScreen = document.getElementById('screen-connecting');
            const statusText = document.getElementById('connecting-status');
            const spinner = document.getElementById('connecting-spinner');
            
            // Setup connecting UI
            document.getElementById('connecting-avatar').src = currentSpecialist.image;
            
            // Show connecting screen overlay
            connectingScreen.classList.remove('opacity-0', 'pointer-events-none');
            spinner.classList.remove('hidden');
            statusText.innerText = "Initializing secure channel...";
            statusText.classList.remove('text-green-400');
            statusText.classList.add('text-indigo-300');

            // Cinematic connection phases
            setTimeout(() => {
                statusText.innerText = `Pinging ${currentSpecialist.name.split(' ')[0]}...`;
            }, 1000);

            setTimeout(() => {
                statusText.innerText = "Connection established";
                statusText.classList.remove('text-indigo-300');
                statusText.classList.add('text-green-400');
                spinner.classList.add('hidden'); // Hide spinner on success
            }, 2200);

            // Transition to chat
            setTimeout(() => {
                connectingScreen.classList.add('opacity-0', 'pointer-events-none');
                
                // Set up chat UI
                document.getElementById('chat-name').innerText = currentSpecialist.name;
                document.getElementById('chat-avatar').src = currentSpecialist.image;
                
                const statusEl = document.getElementById('chat-online-status');
                if (statusEl) {
                    statusEl.innerText = "Online now";
                    statusEl.classList.remove('text-indigo-500', 'animate-pulse');
                    statusEl.classList.add('text-green-600');
                }

                // Reset state for a fresh conversation path
                chatState = { tagQ3: '', tagQ4: '', hasKids: false, mainTrack: '' };
                // Instantly block out base padding at the bottom so it doesn't hug the screen edge
                chatMessagesEl.innerHTML = '<div id="chat-spacer" class="w-full flex-shrink-0" style="height: 24px;"></div>';
                chatOptionsEl.innerHTML = '';
                currentNodeId = "start";

                // Transition screens
                screenSelection.classList.add('-translate-x-full');
                screenChat.classList.remove('translate-x-full');

                // Start conversation branching script
                setTimeout(() => {
                    processNextStep("start");
                }, 600);
            }, 2800);
        }

        function goBack() {
            screenChat.classList.add('translate-x-full');
            screenSelection.classList.remove('-translate-x-full');
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex items-end w-3/4 mb-4 msg-animate';
            div.innerHTML = `
                <img src="${currentSpecialist.image}" class="w-8 h-8 rounded-full object-cover mr-2 mb-1 border border-gray-200">
                <div class="bg-white border border-gray-100 p-4 rounded-2xl rounded-bl-none shadow-sm flex space-x-1 items-center h-[42px]">
                    <svg class="w-1.5 h-1.5 text-gray-400 typing-dot" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5"/></svg>

                    <svg class="w-1.5 h-1.5 text-gray-400 typing-dot" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5"/></svg>

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();

        function appendMessage(text, isUser = false, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `flex w-full mb-4 msg-animate ${isUser ? 'justify-end' : 'justify-start'}`;
            
            // Get current time
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let mediaHtml = '';
            if (imageUrl) {
                // Slightly larger bottom margin if there's no text so the timestamp doesn't overlap the image
                mediaHtml = `<img src="${imageUrl}" alt="Assessment Image" class="w-full h-auto rounded-xl shadow-sm border border-gray-200 object-cover ${text ? 'mb-1.5' : 'mb-3'}" onload="scrollToBottom()" onerror="this.style.display='none'">`;
            }

            // Snug spacer precisely calibrated for the timestamp. w-11 (44px) removes the awkward gap.
            const textContent = text ? `<span class="whitespace-pre-wrap break-words">${text}</span>` : '';
            const spacerHtml = text ? `<span class="inline-block w-11 h-1"></span>` : '';

            if (isUser) {
                div.innerHTML = `
                    <div class="bg-indigo-600 text-white px-3.5 pt-2 pb-1.5 rounded-2xl rounded-br-none shadow-md max-w-[80%] text-sm sm:text-base leading-relaxed relative min-w-[70px]">
                        ${mediaHtml}${textContent}${spacerHtml}
                        <span class="absolute bottom-1 right-2.5 text-[10px] text-indigo-200 leading-none tracking-wide">${timeString}</span>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="flex items-end w-full max-w-[85%]">
                        <img src="${currentSpecialist.image}" class="w-8 h-8 rounded-full object-cover mr-2 mb-1 border border-gray-200 flex-shrink-0">
                        <div class="bg-white border border-gray-100 text-slate-800 px-3.5 pt-2 pb-1.5 rounded-2xl rounded-bl-none shadow-sm text-sm sm:text-base leading-relaxed relative min-w-[70px]">

                        </div>
                    </div>
                `;
            }
            
            // Insert before the spacer
            const spacer = document.getElementById('chat-spacer');
            chatMessagesEl.insertBefore(div, spacer);
            scrollToBottom();

        function showOptions(options, type = "options") {
            chatOptionsEl.innerHTML = '';
            chatOptionsContainer.classList.remove('translate-y-full', 'opacity-0');
            
            if (type === "text") {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex w-full space-x-2 px-2';
                wrapper.innerHTML = `
                    <input type="text" id="chat-text-input" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm" placeholder="Type your answer..." onkeypress="handleEnter(event)">
                    <button onclick="submitText()" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl px-5 py-3 transition-colors shadow-sm active:scale-95 flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                `;
                chatOptionsEl.appendChild(wrapper);
                
                setTimeout(() => {
                    const input = document.getElementById('chat-text-input');
                    if (input) input.focus();
                    
                    const offset = chatOptionsContainer.offsetHeight;
                    const spacer = document.getElementById('chat-spacer');
                    if (spacer) spacer.style.height = `${offset + 24}px`;
                    scrollToBottom();
                }, 50);
            } else {
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold py-3 px-5 rounded-xl border border-indigo-100 transition-all active:scale-95 text-sm flex-grow sm:flex-grow-0 text-center shadow-sm';
                    btn.innerText = opt.label;
                    btn.onclick = () => handleOptionClick(opt);
                    chatOptionsEl.appendChild(btn);
                });

                setTimeout(() => {
                    const offset = chatOptionsContainer.offsetHeight;
                    const spacer = document.getElementById('chat-spacer');
                    if (spacer) spacer.style.height = `${offset + 24}px`;
                    scrollToBottom();
                }, 50);
            }

        function hideOptions() {
            chatOptionsContainer.classList.add('translate-y-full', 'opacity-0');
            const spacer = document.getElementById('chat-spacer');
            if (spacer) spacer.style.height = '24px';
            setTimeout(() => {
                chatOptionsEl.innerHTML = '';
            }, 300);
        }

        function submitText() {
            const input = document.getElementById('chat-text-input');
            const text = input.value.trim();
            if(!text) return;
            
            const node = chatScript[currentNodeId];
            hideOptions();
            appendMessage(text, true);
            
            const nextId = typeof node.nextFn === 'function' ? node.nextFn() : node.next;
            
            setTimeout(() => {
                if (nextId) processNextStep(nextId);
            }, 500);
        }

        function handleEnter(e) {
            if(e.key === 'Enter') submitText();
        }

        function handleOptionClick(opt) {
            hideOptions();
            appendMessage(opt.label, true);
            
            if (opt.action) opt.action();
            
            const nextId = typeof opt.nextFn === 'function' ? opt.nextFn() : opt.next;
            
            setTimeout(() => {
                if (nextId) processNextStep(nextId);
            }, 500); 
        }

        function processNextStep(nodeId) {
            currentNodeId = nodeId;
            const node = chatScript[nodeId];
            if (!node) return;
            
            let nodeText = typeof node.textFn === 'function' ? node.textFn() : (node.text || '');
            const isImageOnly = node.image && !nodeText;

            const executeNext = (typingIdToRemove) => {
                if (typingIdToRemove) removeTypingIndicator(typingIdToRemove);
                appendMessage(nodeText, false, node.image);
                
                setTimeout(() => {
                    if (node.autoNext || typeof node.autoNextFn === 'function') {
                        const nextId = typeof node.autoNextFn === 'function' ? node.autoNextFn() : node.autoNext;
                        processNextStep(nextId);
                    } else {
                        let nodeOptions = typeof node.optionsFn === 'function' ? node.optionsFn() : node.options;
                        showOptions(nodeOptions || [], node.type || "options");
                    }
                }, 400);
            };

            if (isImageOnly) {
                // For images: Wait 9-11 seconds silently, then 1-2 sec typing (Total 10-12s)
                const silenceWait = Math.random() * 2000 + 9000;
                const typingWait = Math.random() * 1000 + 1000;
                
                // Change status exactly at 9 seconds
                setTimeout(() => {
                    const statusEl = document.getElementById('chat-online-status');
                    if (statusEl) {
                        statusEl.innerText = "Sending a picture...";
                        statusEl.classList.remove('text-green-600');
                        statusEl.classList.add('text-indigo-500', 'animate-pulse');
                    }
                }, 9000);
                
                setTimeout(() => {
                    const typingId = showTypingIndicator();
                    setTimeout(() => {
                        const statusEl = document.getElementById('chat-online-status');
                        if (statusEl) {
                            statusEl.innerText = "Online now";
                            statusEl.classList.remove('text-indigo-500', 'animate-pulse');
                            statusEl.classList.add('text-green-600');
                        }
                        executeNext(typingId);
                    }, typingWait);
                }, silenceWait);

            } else {
                // For text: Show typing immediately
                const typingId = showTypingIndicator();
                const typingDelay = Math.random() * 800 + 1000; 

                setTimeout(() => {
                    executeNext(typingId);
                }, typingDelay);
            }
        }

        function scrollToBottom() {
            chatMessagesEl.scrollTo({
                top: chatMessagesEl.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
